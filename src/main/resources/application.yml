spring:
  application:
    name: knowledge-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # --- Graph store ---
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:knowledgehub}

  # --- AI: embedding provider + vector store ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      neo4j:
        # Schema is owned by our SchemaInitializer (vector index on :Chunk), not Spring AI's
        # default Document index — keep this false to avoid a duplicate, unused index.
        initialize-schema: false
        index-name: knowledge-embeddings
        embedding-dimension: 1536

    # --- MCP server (tools for AI agents, over Streamable HTTP at /mcp) ---
    mcp:
      server:
        name: knowledge-hub-mcp
        version: 0.0.1
        protocol: STREAMABLE
        instructions: >-
          Knowledge Hub for AI agents in the SDLC. Exposes tools to query a
          software product's code and documentation knowledge graph.

server:
  port: ${SERVER_PORT:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /docs

# --- Application toggles (config-as-a-feature) ---
app:
  vectorstore:
    mode: ${APP_VECTORSTORE_MODE:neo4j}   # neo4j | neo4j+qdrant
  embedding:
    provider: ${APP_EMBEDDING_PROVIDER:api}   # api | local (OpenAI-compatible endpoint)
  chunk:
    max-tokens: ${APP_CHUNK_MAX_TOKENS:512}
    overlap: ${APP_CHUNK_OVERLAP:64}
  retrieval:
    top-k: ${APP_RETRIEVAL_TOP_K:10}
