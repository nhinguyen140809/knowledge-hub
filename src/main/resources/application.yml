spring:
  application:
    name: knowledge-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # --- Graph store ---
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:knowledgehub}

  # --- AI: embedding provider + vector store ---
  ai:
    openai:
      # Any OpenAI-compatible embeddings endpoint — OpenAI, Voyage AI, or a local
      # server (LM Studio / TEI / llama.cpp). Switch provider or model by env only,
      # no rebuild. `base-url` is the host root; the /v1/embeddings path is appended.
      api-key: ${EMBEDDING_API_KEY:}
      base-url: ${EMBEDDING_BASE_URL:https://api.openai.com}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      # Vectors live in Qdrant (always). gRPC on 6334; collection owned by our SchemaInitializer.
      qdrant:
        host: ${SPRING_AI_VECTORSTORE_QDRANT_HOST:localhost}
        port: ${SPRING_AI_VECTORSTORE_QDRANT_PORT:6334}
        use-tls: ${SPRING_AI_VECTORSTORE_QDRANT_USE_TLS:false}
        api-key: ${QDRANT_API_KEY:}
        collection-name: ${QDRANT_COLLECTION:knowledge-embeddings}
        initialize-schema: false

    # --- MCP server (tools for AI agents, over Streamable HTTP at /mcp) ---
    mcp:
      server:
        name: knowledge-hub-mcp
        version: 0.0.1
        protocol: STREAMABLE
        instructions: >-
          Knowledge Hub for AI agents in the SDLC. Exposes tools to query a
          software product's code and documentation knowledge graph.

server:
  port: ${SERVER_PORT:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /docs

# --- Application toggles (config-as-a-feature) ---
app:
  embedding:
    provider: ${EMBEDDING_PROVIDER:api}   # api (remote, needs key) | local (OpenAI-compatible server; use any placeholder key)
    dimension: ${EMBEDDING_DIMENSION:1536}   # MUST match the model (1536 text-embedding-3-small, 1024 voyage-3); sizes the Qdrant collection
    retry-max-attempts: ${EMBEDDING_RETRY_MAX_ATTEMPTS:3}   # attempts per embedding call (incl. first)
    retry-backoff-ms: ${EMBEDDING_RETRY_BACKOFF_MS:500}   # initial backoff, doubles each retry
  chunk:
    max-tokens: ${APP_CHUNK_MAX_TOKENS:512}
    overlap: ${APP_CHUNK_OVERLAP:64}
  commits:
    history-depth: ${APP_COMMITS_HISTORY_DEPTH:100}   # newest commits indexed per source; 0 disables commit indexing
  retrieval:
    top-k: ${APP_RETRIEVAL_TOP_K:10}
    candidate-k: ${APP_RETRIEVAL_CANDIDATE_K:50}   # candidates each path fetches before fusion
    rrf-k: ${APP_RETRIEVAL_RRF_K:60}   # Reciprocal Rank Fusion constant
    cache-ttl: ${APP_RETRIEVAL_CACHE_TTL:60s}
    cache-max-size: ${APP_RETRIEVAL_CACHE_MAX_SIZE:1000}
    weights:
      vector: ${APP_RETRIEVAL_WEIGHT_VECTOR:1.0}
      keyword: ${APP_RETRIEVAL_WEIGHT_KEYWORD:1.0}
      graph: ${APP_RETRIEVAL_WEIGHT_GRAPH:0.5}
  linking:
    confidence-threshold: ${APP_LINKING_CONFIDENCE_THRESHOLD:0.5}   # min confidence to keep a cross-artifact link
  security:
    api-key: ${API_KEY:}   # bootstrap admin secret; blank disables seeding an admin principal
    credential-retention-months: ${APP_SECURITY_CREDENTIAL_RETENTION_MONTHS:12}   # purge revoked credentials after
    acl-cache-ttl: ${APP_SECURITY_ACL_CACHE_TTL:5s}   # max staleness of a resolved readable-source set
