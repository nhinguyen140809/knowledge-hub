# Regex patterns for the secret-scan scenario. Each pattern flags a likely hardcoded
# credential in application source. Data-driven so the ruleset evolves without code
# changes. This is a lightweight gate, not a replacement for a dedicated scanner
# (gitleaks / trufflehog) — the README notes how to wire one of those in instead.

patterns:
  - name: openai-style-key
    regex: 'sk-[A-Za-z0-9]{20,}'
  - name: aws-access-key-id
    regex: 'AKIA[0-9A-Z]{16}'
  - name: generic-bearer-literal
    regex: '(?i)bearer\s+[A-Za-z0-9_\-\.]{20,}'
  - name: assigned-password-literal
    regex: '(?i)(password|passwd|pwd)\s*[:=]\s*["''][^"'']{6,}["'']'
  - name: assigned-secret-literal
    regex: '(?i)(secret|api[_-]?key|token)\s*[:=]\s*["''][^"'']{12,}["'']'
  - name: private-key-block
    regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'

# Substrings that clear a match as a placeholder/binding rather than a real secret.
allow_substrings:
  - '${'          # Spring property placeholder, e.g. ${API_KEY:}
  - 'example'
  - 'placeholder'
  - 'changeme'
  - 'your-'
  - 'xxxx'
