name: knowledge-hub

services:
  app:
    build: .
    image: knowledge-hub:local
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-knowledgehub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Qdrant holds the vectors (always); gRPC on 6334
      SPRING_AI_VECTORSTORE_QDRANT_HOST: qdrant
      SPRING_AI_VECTORSTORE_QDRANT_PORT: "6334"
      # cap app heap for small / local hosts
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-knowledgehub}
      # --- RAM caps (local-friendly; raise on a real server) ---
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-knowledgehub} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # Vector store (always on — the graph lives in Neo4j, vectors in Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
